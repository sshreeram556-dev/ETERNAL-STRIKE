<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETERNAL STRIKE</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  background:#020617;
  color:white;
  font-family:Orbitron;
  text-align:center;
  margin:0;
}

.container {
  padding:20px;
}

.bar {
  height:12px;
  background:red;
  margin:10px auto;
  width:200px;
}

.btn {
  padding:12px;
  margin:8px;
  background:#1e293b;
  border:1px solid #334155;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h2>⚔️ ETERNAL STRIKE</h2>

<div id="online">🌐 ONLINE: --</div>

<h3>PLAYER</h3>
<div id="pHP" class="bar"></div>

<h3>ENEMY</h3>
<div id="eHP" class="bar"></div>

<button class="btn" onclick="attack()">⚔️ ATTACK</button>
<button class="btn" onclick="upgrade()">⚡ UPGRADE DMG</button>

</div>

<!-- 🔥 FIREBASE + GAME (ALL IN ONE) -->
<script type="module">

// 🔥 FIREBASE IMPORTS
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDocs, collection } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

// 🔥 YOUR FIREBASE CONFIG (ALREADY FILLED)
const firebaseConfig = {
  apiKey: "AIzaSyDNcXkjE6wrZkR5UeurVeu8UMS8I_ZgNKE",
  authDomain: "eternalstrike-c336c.firebaseapp.com",
  projectId: "eternalstrike-c336c",
  storageBucket: "eternalstrike-c336c.firebasestorage.app",
  messagingSenderId: "1031582040385",
  appId: "1:1031582040385:web:c4f07b6a870414194121c0",
  measurementId: "G-SN3L9M8FCT"
};

// 🔥 INIT FIREBASE
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔥 GAME DATA
let player = {
  id: localStorage.getItem("id") || Math.random().toString(36),
  hp: 100,
  dmg: 10
};

let enemy = {
  hp: 100
};

localStorage.setItem("id", player.id);

// 🔥 GAME FUNCTIONS
window.attack = async function(){
  enemy.hp -= player.dmg;
  player.hp -= 5;

  if(enemy.hp <= 0){
    enemy.hp = 100;
  }

  updateUI();
  await savePlayer();
};

window.upgrade = function(){
  player.dmg += 5;
  updateUI();
};

// 🔥 UI UPDATE
function updateUI(){
  document.getElementById("pHP").style.width = player.hp + "%";
  document.getElementById("eHP").style.width = enemy.hp + "%";
}

// 🔥 SAVE TO FIREBASE
async function savePlayer(){
  await setDoc(doc(db, "players", player.id), player);
}

// 🔥 ONLINE COUNT
setInterval(async ()=>{
  const snap = await getDocs(collection(db, "players"));
  document.getElementById("online").innerText =
    "🌐 ONLINE: " + snap.size;
}, 3000);

// START
updateUI();

</script>

</body>
</html>
